{% extends 'base.html' %}
{% block content %}
<form method="POST" class="bg-white p-6 rounded shadow">
<input name="username" placeholder="Username" class="border p-2 w-full mb-3">
<input name="email" placeholder="Email" class="border p-2 w-full mb-3">
<input type="password" name="password" placeholder="Password" class="border p-2 w-full mb-3">
<button class="bg-green-600 text-white px-4 py-2 rounded">Register</button>
</form>
{% endblock %}
