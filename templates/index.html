{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white p-12 rounded-2xl shadow-xl border border-gray-100 text-center my-12 transform transition hover:scale-[1.01]">
    <div class="text-6xl mb-6 animate-bounce">🛡️</div>
    <h1 id="hero-title" class="text-4xl font-extrabold text-gray-900 tracking-tight mb-4">
        Sri Lankan Vehicle Maintenance System
    </h1>
    <p id="hero-sub" class="text-lg text-gray-600 max-w-2xl mx-auto mb-8">
        Track vehicle services, fuel efficiency, and maintenance logs seamlessly.
    </p>
    
    {% if current_user.is_authenticated %}
        <a href="/dashboard" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl shadow-lg hover:shadow-xl transition-all tracking-wide">
            Go to Dashboard &rarr;
        </a>
    {% else %}
        <div class="space-x-4">
            <a href="/login" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-8 py-3 rounded-xl shadow-lg hover:shadow-xl transition-all tracking-wide">
                Sign In
            </a>
            <a href="/register" class="inline-block bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-8 py-3 rounded-xl transition-all tracking-wide">
                Create Account
            </a>
        </div>
    {% endif %}
</div>
{% endblock %}
